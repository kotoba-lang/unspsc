name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure -M:test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      # unspsc's deps.edn :deps resolves io.github.kotoba-lang/technology via
      # a :local/root sibling path (../technology) rather than a git dep, so CI
      # has to reproduce the orgs/kotoba-lang/<repo> layout instead of a single
      # checkout.
      - name: Checkout unspsc
        uses: actions/checkout@v4
        with:
          path: work/orgs/kotoba-lang/unspsc

      - name: Checkout technology sibling
        uses: actions/checkout@v4
        with:
          repository: kotoba-lang/technology
          path: work/orgs/kotoba-lang/technology

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache m2 / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('work/orgs/kotoba-lang/unspsc/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-

      - name: Run tests
        working-directory: work/orgs/kotoba-lang/unspsc
        run: clojure -M:test

      - name: Lint (clj-kondo)
        working-directory: work/orgs/kotoba-lang/unspsc
        run: clojure -M:lint
